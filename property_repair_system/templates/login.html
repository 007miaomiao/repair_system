<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>物业报修系统登录</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background: linear-gradient(to right, #4facfe, #00f2fe);">

<div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">

    <div class="card shadow-lg p-4" style="width: 400px; border-radius: 15px;">
        <div class="text-center mb-4">
            <h2 class="text-primary">物业报修系统</h2>
            <p class="text-muted">用户登录</p>
        </div>

        <form method="POST" action="/login">
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <input type="text" name="username" class="form-control" placeholder="请输入用户名" required>
            </div>

            <div class="mb-3">
                <label class="form-label">密码</label>
                <input type="password" name="userpassword" class="form-control" placeholder="请输入密码" required>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">登录</button>
            </div>
        </form>
    </div>

</div>

</body>
</html>
