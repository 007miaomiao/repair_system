<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>客服管理中心</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color:#f4f6f9;">

<div class="container-fluid">
    <div class="row">

        <!-- 左侧边栏 -->
        <div class="col-2 bg-dark text-white vh-100 p-4">
            <h4 class="mb-4">客服中心</h4>

            <ul class="nav flex-column">
                <li class="nav-item mb-3">
                    <a href="/service" class="nav-link text-white bg-primary rounded">
                        待派工报修
                    </a>
                </li>

                <li class="nav-item mb-3">
                    <a href="/service" class="nav-link text-white">
                        超时工单
                    </a>
                </li>

                <li class="nav-item mb-3">
                    <a href="#" class="nav-link text-secondary">
                        统计报表
                    </a>
                </li>

                <li class="nav-item mt-5">
                    <a href="/logout" class="btn btn-outline-light w-100">
                        退出登录
                    </a>
                </li>
            </ul>
        </div>

        <!-- 右侧内容区 -->
        <div class="col-10 p-4">

            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    待派工报修列表
                </div>

                <div class="card-body">
                    <table class="table table-bordered table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>报修ID</th>
                                <th>报修类型</th>
                                <th>问题描述</th>
                                <th>报修地址</th>
                                <th>状态</th>
                                <th>派工</th>
                            </tr>
                        </thead>
                        <tbody>
                        {% for repair in repairs %}
                            <tr>
                                <td>{{ repair.id }}</td>
                                <td>{{ repair.repair_type }}</td>
                                <td>{{ repair.description }}</td>
                                <td>{{ repair.owner_address }}</td>

                                <td>
                                    {% if repair.id in timeout_repairs %}
                                        <span class="badge bg-danger">超时未处理</span>
                                    {% else %}
                                        <span class="badge bg-warning text-dark">待处理</span>
                                    {% endif %}
                                </td>

                                <td>
                                    <form method="POST" action="/service" class="d-flex">
                                        <input type="hidden" name="repair_id" value="{{ repair.id }}">

                                        <select name="worker_id" class="form-select me-2" required>
                                            <option value="">选择维修工</option>
                                            {% for worker in workers %}
                                                <option value="{{ worker.userid }}">{{ worker.username }}</option>
                                            {% endfor %}
                                        </select>

                                        <button type="submit" class="btn btn-success">
                                            派工
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>

        </div>

    </div>
</div>

</body>
</html>
