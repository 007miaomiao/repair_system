<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>客服派工中心</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color:#f5f7fa;">

<div class="container mt-5">

    <!-- 顶部 -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary">客服派工中心</h2>
        <a href="/logout" class="btn btn-outline-danger">退出登录</a>
    </div>

    <!-- 待派工报修单 -->
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            待处理报修单
        </div>

        <div class="card-body">
            <table class="table table-bordered table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>报修ID</th>
                        <th>业主ID</th>
                        <th>报修地址</th>
                        <th>报修类型</th>
                        <th>问题描述</th>
                        <th>分配维修工</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                {% for repair in repairs %}
                    <tr>
                        <form method="POST" action="/service">
                            <td>
                                {{ repair.id }}
                                <input type="hidden" name="repair_id" value="{{ repair.id }}">
                            </td>
                            <td>{{ repair.owner_id }}</td>
                            <td>{{ repair.owner_address }}</td>
                            <td>{{ repair.repair_type }}</td>
                            <td>{{ repair.description }}</td>
                            <td>
                                <select name="worker_id" class="form-select" required>
                                    <option value="">请选择维修工</option>
                                    {% for worker in workers %}
                                        <option value="{{ worker.userid }}">{{ worker.username }}</option>
                                    {% endfor %}
                                </select>
                            </td>
                            <td>
                                {% if repair.id in timeout_repairs %}
                                    <span class="badge bg-danger">超时未处理</span>
                                {% else %}
                                    <span class="badge bg-warning text-dark">待处理</span>
                                {% endif %}
                            </td>
                            <td>
                                <button type="submit" class="btn btn-success btn-sm">派工</button>
                            </td>
                        </form>
                    </tr>
                {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
