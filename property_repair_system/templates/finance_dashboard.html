<!DOCTYPE html>
<html>
<head>
    <title>财务收费</title>
</head>
<body>
    <h2>待收费账单</h2>

    <table border="1">
        <tr>
            <th>支付ID</th>
            <th>报修ID</th>
            <th>金额</th>
            <th>状态</th>
            <th>操作</th>
        </tr>

        {% for payment in payments %}
        <tr>
            <td>{{ payment.id }}</td>
            <td>{{ payment.repair_id }}</td>
            <td>{{ payment.amount }}</td>
            <td>{{ payment.status }}</td>
            <td>
                <form method="post">
                    <input type="hidden" name="payment_id" value="{{ payment.id }}">
                    <button type="submit">确认收费</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
