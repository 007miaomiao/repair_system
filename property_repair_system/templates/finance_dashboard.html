<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>财务收费中心</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color:#f5f7fa;">

<div class="container mt-5">

    <!-- 顶部 -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary">财务收费中心</h2>
        <a href="/logout" class="btn btn-outline-danger">退出登录</a>
    </div>

    <!-- 待收费列表 -->
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            待收费工单
        </div>

        <div class="card-body">
            <table class="table table-bordered table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>支付ID</th>
                        <th>报修ID</th>
                        <th>金额</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                {% for payment in payments %}
                    <tr>
                        <form method="POST" action="/finance">
                            <td>
                                {{ payment.id }}
                                <input type="hidden" name="payment_id" value="{{ payment.id }}">
                            </td>
                            <td>{{ payment.repair_id }}</td>
                            <td>￥{{ payment.amount }}</td>
                            <td>
                                <span class="badge bg-warning text-dark">未支付</span>
                            </td>
                            <td>
                                <button type="submit" class="btn btn-success btn-sm">确认收费</button>
                            </td>
                        </form>
                    </tr>
                {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
