<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>维修工任务中心</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color:#f5f7fa;">

<div class="container mt-5">

    <!-- 顶部 -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary">维修工任务中心</h2>
        <a href="/logout" class="btn btn-outline-danger">退出登录</a>
    </div>

    <!-- 维修任务列表 -->
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            待处理维修任务
        </div>

        <div class="card-body">
            <table class="table table-bordered table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>报修ID</th>
                        <th>报修地址</th>
                        <th>报修类型</th>
                        <th>问题描述</th>
                        <th>维修结果</th>
                        <th>维修费用</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                {% for repair in repairs %}
                    <tr>
                        <form method="POST" action="/worker">
                            <td>
                                {{ repair.id }}
                                <input type="hidden" name="repair_id" value="{{ repair.id }}">
                            </td>
                            <td>{{ repair.owner_address }}</td>
                            <td>{{ repair.repair_type }}</td>
                            <td>{{ repair.description }}</td>
                            <td>
                                <textarea name="result" class="form-control" rows="2" placeholder="填写维修结果" required></textarea>
                            </td>
                            <td>
                                <input type="number" step="0.01" name="cost" class="form-control" placeholder="费用" required>
                            </td>
                            <td>
                                <button type="submit" class="btn btn-success btn-sm">提交维修</button>
                            </td>
                        </form>
                    </tr>
                {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
