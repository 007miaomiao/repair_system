<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>维修工管理中心</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color:#f4f6f9;">

<div class="container-fluid">
    <div class="row">

        <!-- 左侧边栏 -->
        <div class="col-2 bg-dark text-white vh-100 p-4">
            <h4 class="mb-4">维修中心</h4>

            <ul class="nav flex-column">
                <li class="nav-item mb-3">
                    <a href="/worker" class="nav-link text-white bg-primary rounded">
                        我的任务
                    </a>
                </li>

                <li class="nav-item mb-3">
                    <a href="#" class="nav-link text-secondary">
                        已完成维修
                    </a>
                </li>

                <li class="nav-item mt-5">
                    <a href="/logout" class="btn btn-outline-light w-100">
                        退出登录
                    </a>
                </li>
            </ul>
        </div>

        <!-- 右侧内容区 -->
        <div class="col-10 p-4">

            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    我的维修任务
                </div>

                <div class="card-body">
                    <table class="table table-bordered table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>报修ID</th>
                                <th>报修类型</th>
                                <th>问题描述</th>
                                <th>报修地址</th>
                                <th>维修记录</th>
                            </tr>
                        </thead>
                        <tbody>
                        {% for repair in repairs %}
                            <tr>
                                <td>{{ repair.id }}</td>
                                <td>{{ repair.repair_type }}</td>
                                <td>{{ repair.description }}</td>
                                <td>{{ repair.owner_address }}</td>

                                <td>
                                    <form method="POST" action="/worker">
                                        <input type="hidden" name="repair_id" value="{{ repair.id }}">

                                        <div class="mb-2">
                                            <textarea name="result" class="form-control" rows="2" placeholder="维修结果" required></textarea>
                                        </div>

                                        <div class="mb-2">
                                            <input type="number" step="0.01" name="cost" class="form-control" placeholder="维修费用" required>
                                        </div>

                                        <button type="submit" class="btn btn-success btn-sm">
                                            提交维修记录
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>

        </div>

    </div>
</div>

</body>
</html>
