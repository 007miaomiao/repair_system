<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>财务管理中心</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color:#f4f6f9;">

<div class="container-fluid">
    <div class="row">

        <!-- 左侧边栏 -->
        <div class="col-2 bg-dark text-white vh-100 p-4">
            <h4 class="mb-4">财务中心</h4>

            <ul class="nav flex-column">
                <li class="nav-item mb-3">
                    <a href="/finance" class="nav-link text-white bg-primary rounded">
                        待收费订单
                    </a>
                </li>

                <li class="nav-item mb-3">
                    <a href="#" class="nav-link text-secondary">
                        收费记录
                    </a>
                </li>

                <li class="nav-item mt-5">
                    <a href="/logout" class="btn btn-outline-light w-100">
                        退出登录
                    </a>
                </li>
            </ul>
        </div>

        <!-- 右侧内容区 -->
        <div class="col-10 p-4">

            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    待收费订单列表
                </div>

                <div class="card-body">
                    <table class="table table-bordered table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>报修ID</th>
                                <th>收费金额</th>
                                <th>收费状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                        {% for payment in payments %}
                            <tr>
                                <td>{{ payment.repair_id }}</td>
                                <td>￥{{ payment.amount }}</td>
                                <td>
                                    {% if payment.status == 'unpaid' %}
                                        <span class="badge bg-warning text-dark">未收费</span>
                                    {% else %}
                                        <span class="badge bg-success">已收费</span>
                                    {% endif %}
                                </td>
                                <td>
                                    <form method="POST" action="/finance">
                                        <input type="hidden" name="payment_id" value="{{ payment.id }}">
                                        <button type="submit" class="btn btn-success btn-sm">
                                            确认收费
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>

        </div>

    </div>
</div>

</body>
</html>
